name: Update LeetCode Stats

on:
  # Run every day at 00:30 UTC (after midnight so LC day resets settle)
  schedule:
    - cron: "30 0 * * *"

  # Allow triggering manually from the Actions tab
  workflow_dispatch:

jobs:
  update-stats:
    name: Fetch & commit data.json
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated data.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch LeetCode stats
        run: python fetch_stats.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit."
          else
            git commit -m "chore: update LeetCode stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
